mirror_main_to_github:
  stage: deploy
  script:
    # Set CI username
    - git config --global user.name "GitLab CI"
    - git config --global user.email "ci@gitlab.com"

    # Setup SSH for GitHub
    - mkdir -p ~/.ssh
    - echo "$GITHUB_DEPLOY_KEY" > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan github.com >> ~/.ssh/known_hosts

    # # Clone GitHub repo
    - git clone git@github.com:rivm-syso/$GITHUB_REPO.git --tags github_repo
    - cd github_repo

    # Copy fresh snapshot from GitLab (without its .git)
    - mkdir ../snapshot
    - git clone --branch=main --depth=1 "$CI_REPOSITORY_URL" ../snapshot
    - rsync -a --delete --exclude='.git' ../snapshot/ .

    # Stage and commit snapshot only when changes are found
    - git add .
    - |
      if ! git diff --cached --quiet; then
        git commit -m "Mirrored snapshot $CI_COMMIT_TAG from GitLab"
      else
        echo "=== !!! No changes to commit !!! ==="
      fi

    # Tag if applicable
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        git tag -f "$CI_COMMIT_TAG"
      fi

    # Push snapshot and tags to GitHub
    - git push --force origin main
    - git push origin --tags

  rules:
    # Skip if [clean GH] is in the commit message (highest priority)
    - if: '$CI_COMMIT_MESSAGE =~ /(?i)\[\s*clean GH\s*\]/'
      when: never
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
      when: on_success
    - when: never


