#### CICD for DARA packages ####

variables:
  R_LIBS_USER: "${CI_PROJECT_DIR}/Rlib"
  LINTR_ERROR_ON_LINT: true

image: daratools/darabase:latest

# define cache (for package installs, reduces job time)
cache:
  key: cache-$CI_PIPELINE_ID
  paths:
    - $R_LIBS_USER

# define stages of runners
stages:
  - setup
  - check
  - test
  - coverage
  - deploy

setup_r_dependencies:
  stage: setup
  script:
    - mkdir -p "$R_LIBS_USER" && cd "$R_LIBS_USER"
    - R -e 'devtools::install_deps(dependencies = TRUE, repos = "http://cran.r-project.org", upgrade = "never")'
  artifacts:
      paths:
        - $R_LIBS_USER
      exclude:
        - .git/**/*  # Exclude all git-related files
        - .git/      # Explicitly exclude .git directory
        - .gitignore # Exclude gitignore file
        - .gitlab-ci.yml  # Exclude CI config
  rules:
    - when: on_success

run_checks:
  stage: check
  dependencies:
    - setup_r_dependencies
  script:
    - R -e 'devtools::check(error_on = "warning", cran = FALSE, args = c("--no-tests"))'
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[\s*fast CI\s*\]/'
      when: never
    - when: on_success

run_lint:
  stage: check
  script:
    - R -e 'lintr::lint_package()'
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[\s*fast CI\s*\]/'
      when: never
    - when: on_success

run_unittests:
  stage: test
  dependencies:
    - setup_r_dependencies
  script:
    - R -e 'devtools::test(stop_on_failure = TRUE)'
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[\s*fast CI\s*\]/'
      when: never
    - when: on_success

run_coverage:
  stage: coverage
  dependencies:
    - setup_r_dependencies
  script:
    - R -e 'covr::package_coverage(path = ".")'
  coverage: '/Coverage: \d+(?:\.\d+)?/'
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[\s*fast CI\s*\]/'
      when: never
    - when: on_success

pages:
  stage: deploy
  script:
     - |
      R -e '
      devtools::document()
      pkgdown::build_site()
      install.packages(c("covr", "DT"))
      covr::gitlab(quiet = FALSE)
      '
  artifacts:
    paths:
    - public
