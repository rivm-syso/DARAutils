name: Publish Coverage Badge

on:
  workflow_run:
    workflows: ["R-CMD-check"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  publish-badge:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout main (template source)
        uses: actions/checkout@v4
        with:
          ref: main
          path: repo-main
          fetch-depth: 0

      - name: Checkout gh-pages (site target)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: repo-ghpages
          fetch-depth: 0

      - name: Get coverage from workflow logs
        id: coverage
        run: |
          # Fetch workflow run logs and extract coverage percentage
          LOGS=$(curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/attempts/1/logs")
          
          # Extract coverage percent from "Coverage percent: XX.XX%" in logs
          PCT=$(echo "$LOGS" | grep -oP 'Coverage percent: \K[0-9.]+' | head -1)
          
          if [ -z "$PCT" ]; then
            echo "Warning: Could not extract coverage, defaulting to 0"
            PCT=0
          fi
          
          echo "percentage=$PCT" >> $GITHUB_OUTPUT
          echo "Coverage extracted: $PCT%"

      - name: Generate badge
        run: |
          PCT=${{ steps.coverage.outputs.percentage }}

          # Determine color
          if (( $(echo "$PCT >= 80" | bc -l) )); then
            COLOR="green"
          elif (( $(echo "$PCT >= 60" | bc -l) )); then
            COLOR="yellow"
          else
            COLOR="red"
          fi

          mkdir -p repo-ghpages/badges

          # Use template from repo-main; fail if missing
          if [ -f repo-main/.github/templates/coverage-badge.svg ]; then
            sed "s/{{PCT}}/$PCT/g; s/{{COLOR}}/$COLOR/g" repo-main/.github/templates/coverage-badge.svg > repo-ghpages/badges/coverage.svg
          else
            echo "ERROR: template repo-main/.github/templates/coverage-badge.svg not found"
            exit 1
          fi

          echo "Generated file size: $(stat -c%s repo-ghpages/badges/coverage.svg 2>/dev/null || echo 0)"
          echo "Head of generated file:"
          head -n 8 repo-ghpages/badges/coverage.svg || true

      - name: Commit and push
        run: |
          cd repo-ghpages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badges/coverage.svg
          git commit -m "chore: update coverage badge to ${{ steps.coverage.outputs.percentage }}%" || echo "No changes"
          git push

