name: Publish Coverage Badge

on:
  workflow_run:
    workflows: ["R-CMD-check"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  publish-badge:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Download coverage artifact
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: R-CMD-check.yaml
          name: coverage-artifacts
          path: coverage

      - name: Read coverage percentage
        id: coverage
        run: |
          PCT=$(jq '.percentage' coverage/coverage-summary.json)
          echo "percentage=$PCT" >> $GITHUB_OUTPUT
          echo "Coverage extracted: $PCT%"

      - name: Generate badge
        run: |
          PCT=${{ steps.coverage.outputs.percentage }}
          if (( $(echo "$PCT >= 80" | bc -l) )); then COLOR="green"
          elif (( $(echo "$PCT >= 60" | bc -l) )); then COLOR="yellow"
          else COLOR="red"; fi

          mkdir -p badges
          cat > badges/coverage.svg <<EOF
          <svg xmlns="http://www.w3.org/2000/svg" width="140" height="20" role="img" aria-label="coverage: $PCT%">
            <title>coverage: $PCT%</title>
            <rect width="94" height="20" fill="#555"/>
            <rect x="94" width="46" height="20" fill="$COLOR"/>
            <text x="47" y="14" fill="#fff" font-size="11" text-anchor="middle">coverage</text>
            <text x="117" y="14" fill="#fff" font-size="11" text-anchor="middle">$PCT%</text>
          </svg>
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badges/coverage.svg
          git commit -m "chore: update coverage badge to ${{ steps.coverage.outputs.percentage }}%" || echo "No changes"
          git push
