name: Publish Coverage Badge

on:
  workflow_run:
    workflows: ["R-CMD-check"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  publish-badge:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Download coverage from workflow
        uses: actions/download-artifact@v4
        with:
          name: coverage-artifacts
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          path: ./coverage-data

      - name: Extract coverage and generate badge
        run: |
          # Read coverage percentage from coverage-summary.json if it exists
          if [ -f "./coverage-data/coverage-summary.json" ]; then
            pct=$(jq -r '.percentage' ./coverage-data/coverage-summary.json)
          else
            # Fallback: extract from coverage.xml
            if [ -f "./coverage-data/coverage.xml" ]; then
              covered=$(grep -oP 'lines-covered="\K[0-9]+' "./coverage-data/coverage.xml" || echo 0)
              valid=$(grep -oP 'lines-valid="\K[0-9]+' "./coverage-data/coverage.xml" || echo 0)
              if [ "$valid" -eq 0 ]; then
                pct=0
              else
                pct=$(awk "BEGIN {printf \"%.2f\", ($covered/$valid)*100}")
              fi
            else
              pct=0
            fi
          fi
          
          echo "Coverage: $pct%"
          
          # Determine badge color based on percentage
          if (( $(echo "$pct >= 80" | bc -l) )); then
            color="green"
          elif (( $(echo "$pct >= 60" | bc -l) )); then
            color="yellow"
          else
            color="red"
          fi
          
          # Create SVG badge
          mkdir -p ./badges
          cat > ./badges/coverage.svg << EOF
          <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="140" height="20" role="img" aria-label="coverage: $pct%">
            <title>coverage: $pct%</title>
            <linearGradient id="s" x2="0" y2="100%">
              <stop offset="0" stop-color="#bbb"/>
              <stop offset="1" stop-color="#999"/>
            </linearGradient>
            <clipPath id="r">
              <rect width="140" height="20" rx="3" fill="#fff"/>
            </clipPath>
            <g clip-path="url(#r)">
              <rect width="94" height="20" fill="#555"/>
              <rect x="94" width="46" height="20" fill="$color"/>
              <rect width="140" height="20" fill="url(#s)" opacity="0.1"/>
            </g>
            <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" text-rendering="geometricPrecision" font-size="11">
              <text aria-hidden="true" x="480" y="150" fill="#010101" fill-opacity="0.3" transform="scale(.1)" textLength="840">coverage</text>
              <text x="480" y="140" transform="scale(.1)" fill="#fff" textLength="840">coverage</text>
              <text aria-hidden="true" x="1160" y="150" fill="#010101" fill-opacity="0.3" transform="scale(.1)" textLength="360">$pct%</text>
              <text x="1160" y="140" transform="scale(.1)" fill="#fff" textLength="360">$pct%</text>
            </g>
          </svg>
          EOF

      - name: Commit and push badge
        run: |
          cd ./badges
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add coverage.svg
          git commit -m "Update coverage badge: $pct%" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
