name: Publish Coverage Badge

on:
  workflow_run:
    workflows: ["R-CMD-check"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  publish-badge:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Get coverage from workflow logs
        id: coverage
        run: |
          # Fetch workflow run logs and extract coverage percentage
          LOGS=$(curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/attempts/1/logs")
          
          # Extract coverage percent from "Coverage percent: XX.XX%" in logs
          PCT=$(echo "$LOGS" | grep -oP 'Coverage percent: \K[0-9.]+' | head -1)
          
          if [ -z "$PCT" ]; then
            echo "Warning: Could not extract coverage, defaulting to 0"
            PCT=0
          fi
          
          echo "percentage=$PCT" >> $GITHUB_OUTPUT
          echo "Coverage extracted: $PCT%"

      - name: Generate badge
        run: |
          PCT=${{ steps.coverage.outputs.percentage }}
          
          # Determine color
          if (( $(echo "$PCT >= 80" | bc -l) )); then
            COLOR="green"
          elif (( $(echo "$PCT >= 60" | bc -l) )); then
            COLOR="yellow"
          else
            COLOR="red"
          fi
          
          # Create badge directory and SVG
          mkdir -p badges
          cat > badges/coverage.svg << 'EOF'
          <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="140" height="20" role="img" aria-label="coverage: $PCT%">
            <title>coverage: $PCT%</title>
            <linearGradient id="s" x2="0" y2="100%">
              <stop offset="0" stop-color="#bbb"/>
              <stop offset="1" stop-color="#999"/>
            </linearGradient>
            <clipPath id="r">
              <rect width="140" height="20" rx="3" fill="#fff"/>
            </clipPath>
            <g clip-path="url(#r)">
              <rect width="94" height="20" fill="#555"/>
              <rect x="94" width="46" height="20" fill="$COLOR"/>
              <rect width="140" height="20" fill="url(#s)" opacity="0.1"/>
            </g>
            <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" text-rendering="geometricPrecision" font-size="11">
              <text aria-hidden="true" x="480" y="150" fill="#010101" fill-opacity="0.3" transform="scale(.1)" textLength="840">coverage</text>
              <text x="480" y="140" transform="scale(.1)" fill="#fff" textLength="840">coverage</text>
              <text aria-hidden="true" x="1160" y="150" fill="#010101" fill-opacity="0.3" transform="scale(.1)" textLength="360">$PCT%</text>
              <text x="1160" y="140" transform="scale(.1)" fill="#fff" textLength="360">$PCT%</text>
            </g>
          </svg>
          EOF
          
          # Substitute values
          sed -i "s/\$PCT/$PCT/g" badges/coverage.svg
          sed -i "s/\$COLOR/$COLOR/g" badges/coverage.svg

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badges/coverage.svg
          git commit -m "chore: update coverage badge to ${{ steps.coverage.outputs.percentage }}%" || echo "No changes"
          git push

