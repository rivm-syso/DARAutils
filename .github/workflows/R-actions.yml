name: R-CMD-check-and-Coverage

on: [push, pull_request]


jobs:
  R-CMD-check:
    runs-on: ubuntu-latest
    container:
      image: daratools/darabase:latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check R inside container
        run: |
          R --version
          Rscript -e 'cat("--- sessionInfo() ---\n"); print(sessionInfo())'
          Rscript -e 'install.packages("sendmailR")' #Should be removed later.
        shell: bash

      - name: Run R CMD check
        run: rcmdcheck::rcmdcheck(args = "--no-manual", error_on = "warning")
        shell: Rscript {0}

      - name: Generate coverage XML & badge
        run: |
          Rscript -e 'if (!requireNamespace("covr", quietly = TRUE)) install.packages("covr")'
          Rscript -e 'cov <- covr::package_coverage(); covr::to_cobertura(cov, file = "coverage.xml")'
        
          covered=$(xmllint --xpath 'string(/coverage/@lines-covered)' coverage/coverage.xml 2>/dev/null || echo   0)
          valid=$(xmllint --xpath 'string(/coverage/@lines-valid)' coverage/coverage.xml 2>/dev/null || echo 0)
         
          if [ "$valid" -eq 0 ]; then
            pct=0
          else
            pct=$(awk "BEGIN {printf \"%.2f\", ($covered/$valid)*100}")
          fi
        
          COLOR="#C55A47"
          if (( $(echo "$PCT >= 80" | awk '{print ($1>=80)}') )); then
            COLOR="#34915E"
          elif (( $(echo "$PCT >= 60" | awk '{print ($1>=60)}') )); then
            COLOR="#C4A023"
          fi

          mkdir -p badges
          cat > badges/coverage.svg <<EOF
          <svg xmlns="http://www.w3.org/2000/svg" width="110" height="20" role="img" aria-label="coverage: $PCT%">
            <title>coverage: $PCT%</title>
            <rect width="70" height="20" rx="5px" fill="#545455"/>
            <rect x="60" width="50" height="20" rx="5px" fill="$COLOR"/>
            <rect x="58" width="5" height="20" fill="#545455"/>
            <text x="30" y="14" fill="#E6E1E1" font-size="12" text-anchor="middle" font-family="monospace" font-weight="bold">Coverage</text>
            <text x="85" y="14" fill="#E6E1E1" font-size="12" text-anchor="middle" font-family="monospace" font-weight="bold">$PCT%</text>
          </svg>
          EOF
        shell: bash

        # Run lintr and generate lint badge
      - name: Run lintr & generate badge
        run: |
          # Run lintr
          Rscript -e 'if (!requireNamespace("lintr", quietly = TRUE)) install.packages("lintr")'
          Rscript -e 'lintr::lint_dir()'
          LINT_STATUS=$?

          # Determine badge status
          STATUS="passing"
          if [ $LINT_STATUS -ne 0 ]; then
            STATUS="failing"
          fi

          # Generate SVG badge
          mkdir -p badges
          cat > badges/lint.svg <<EOF
          <svg xmlns="http://www.w3.org/2000/svg" width="85" height="20">
            <rect width="38" height="20" rx="5px" fill="#545455"/>
            <rect x="37" width="48" height="20" rx="5px" fill="$COLOR"/>
            <rect x="35" width="5" height="20" fill="#545455"/>
            <text x="20" y="14" fill="#E6E1E1" font-size="12" text-anchor="middle" font-family="monospace" font-weight="bold">lintR</text>
            <text x="62" y="14" fill="#E6E1E1" font-size="12" text-anchor="middle" font-family="monospace" font-weight="bold">%LABEL</text>
          </svg>
          EOF
        shell: bash

              # Upload badges
      - name: Upload badges
        uses: actions/upload-artifact@v4
        with:
          name: badges
          path: badges/
          
      # Push badges to gh-pages
      # Push badges to gh-pages
      - name: Deploy badges to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./badges       # local folder containing badges
          destination_dir: badges     # folder in gh-pages branch
          commit_message: "chore: update badges"
          keep_files: true            # preserve existing files in gh-pages

      # Update README
      - name: Update README badges
        run: |
          README=README.md
          COVERAGE_BADGE="![Coverage Status](https://<username>.github.io/<repo>/badges/coverage.svg)"
          LINTR_BADGE="![LINTR Status](https://<username>.github.io/<repo>/badges/lintr.svg)"

          if grep -q "!\[Coverage Status\]" "$README"; then
            sed -i "s|!\[Coverage Status\](.*)|$COVERAGE_BADGE|" "$README"
          else
            echo "$COVERAGE_BADGE" >> "$README"
          fi

          if grep -q "!\[LINTR Status\]" "$README"; then
            sed -i "s|!\[LINTR Status\](.*)|$LINTR_BADGE|" "$README"
          else
            echo "$LINTR_BADGE" >> "$README"
          fi

      - name: Commit and push README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update coverage & LINTR badges in README" || echo "No changes to commit"
          git push origin HEAD:main