name: R CMD CHECK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest
    container:
      image: daratools/darabase:latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # rocker/tidyverse runs as root; mark the workspace as safe for git
      - name: Fix git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      # qpdf is required by R CMD CHECK for PDF size reduction checks
      - name: Install system dependencies
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends qpdf

      # No setup-r step needed — R is already installed in your Docker image
      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - name: Run R CMD CHECK
        uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'

  lint:
    runs-on: ubuntu-latest
    container:
      image: daratools/darabase:latest

    permissions:
      contents: write

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    # Always run, even if R-CMD-check fails
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # rocker/tidyverse runs as root; mark the workspace as safe for git
      - name: Fix git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install lintr
        # Added install to negate the linter from going of in the man pages.
        run: | 
          install.packages("lintr")
          devtools::install_local(".", dependencies = TRUE)
        shell: Rscript {0}

      - name: Run lintr
        # continue-on-error keeps the job green (warn only, never fail)
        continue-on-error: true
        run: |
          # Uses your .lintr config file at the repo root automatically
          lints <- lintr::lint_package()
          n <- length(lints)
          cat("Lint issues found:", n, "\n")
          if (n > 0) print(lints)
          # Write count to a file for the badge step
          writeLines(as.character(n), "lint_count.txt")
          if (n > 0) stop(n, " lint issue(s) found.")
        shell: Rscript {0}

      - name: Push lint badge to gh-pages
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          # Generate badge JSON into /tmp first to avoid untracked file conflict on branch switch
          N=$(cat lint_count.txt 2>/dev/null || echo "0")
          if [ "$N" -eq 0 ]; then
            COLOR="brightgreen"; MESSAGE="passing"
          elif [ "$N" -le 5 ]; then
            COLOR="yellow"; MESSAGE="${N} issues"
          elif [ "$N" -le 15 ]; then
            COLOR="orange"; MESSAGE="${N} issues"
          else
            COLOR="red"; MESSAGE="${N} issues"
          fi
          mkdir -p /tmp/badge-output
          printf '{\n  "schemaVersion": 1,\n  "label": "lintr",\n  "message": "%s",\n  "color": "%s"\n}\n' \
            "$MESSAGE" "$COLOR" > /tmp/badge-output/lint.json
          echo "Lint badge: ${MESSAGE} (${COLOR})"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin gh-pages 2>/dev/null || true
          if git show-ref --quiet refs/remotes/origin/gh-pages; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . --quiet
          fi

          mkdir -p badges
          cp /tmp/badge-output/lint.json badges/lint.json
          git add badges/lint.json
          git diff --cached --quiet || git commit -m "chore: update lint badge [skip ci]"
          git push origin gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}