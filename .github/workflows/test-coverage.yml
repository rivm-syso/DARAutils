name: Test Coverage

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  coverage:
    runs-on: ubuntu-latest
    container:
      image: daratools/darabase:latest

    permissions:
      contents: write

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # rocker/tidyverse runs as root; mark the workspace as safe for git
      - name: Fix git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      # No setup-r step needed — R is already installed in your Docker image

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::covr, any::jsonlite
          needs: coverage

      - name: Run tests and compute coverage
        run: |
          cov <- covr::package_coverage(
            quiet = FALSE,
            clean = FALSE,
            install_path = file.path(
              normalizePath(Sys.getenv("RUNNER_TEMP"), winslash = "/"),
              "package"
            )
          )
          covr::to_cobertura(cov)
          pct <- round(covr::percent_coverage(cov), 1)

          # Determine badge color
          color <- dplyr::case_when(
            pct >= 90 ~ "brightgreen",
            pct >= 75 ~ "green",
            pct >= 60 ~ "yellowgreen",
            pct >= 50 ~ "yellow",
            pct >= 40 ~ "orange",
            TRUE      ~ "red"
          )

          # Write badge JSON for shields.io endpoint badge
          badge <- jsonlite::toJSON(
            list(
              schemaVersion = 1,
              label   = "coverage",
              message = paste0(pct, "%"),
              color   = color
            ),
            auto_unbox = TRUE,
            pretty = TRUE
          )
          dir.create("/tmp/badge-output", showWarnings = FALSE, recursive = TRUE)
          writeLines(badge, "/tmp/badge-output/coverage.json")
          cat("Coverage:", pct, "%\n")
        shell: Rscript {0}

      - name: Upload coverage badge JSON to GitHub Pages branch
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Switch to (or create) the gh-pages branch
          git fetch origin gh-pages 2>/dev/null || true
          if git show-ref --quiet refs/remotes/origin/gh-pages; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . --quiet
          fi

          # Place the badge file and commit
          mkdir -p badges
          cp /tmp/badge-output/coverage.json badges/coverage.json
          git add badges/coverage.json
          git diff --cached --quiet || git commit -m "chore: update coverage badge [skip ci]"
          git push origin gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}