# For help debugging build failures open an issue on the RStudio community with the 'github-actions' tag.
on: [push, pull_request]

name: R-CMD-check

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest
    container:
      image: daratools/darabase:latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      coverage: ${{ steps.extract-coverage.outputs.coverage }}
    steps:
      - uses: actions/checkout@v4

      - name: Check R inside container
        run: |
          R --version
          Rscript -e 'cat("--- sessionInfo() ---\n"); print(sessionInfo())'
          Rscript -e 'install.packages("sendmailR")'
        shell: bash

      - name: Check
        run: rcmdcheck::rcmdcheck(args = "--no-manual", error_on = "warning")
        shell: Rscript {0}

      - name: Generate coverage XML
        run: |
          Rscript -e 'if (!requireNamespace("covr", quietly = TRUE)) install.packages("covr")'
          Rscript -e 'cov <- covr::package_coverage(); covr::to_cobertura(cov, file = "coverage.xml")'
        shell: bash

      - id: extract-coverage
        name: Extract coverage percentage
        run: |
          COVERAGE_XML=coverage.xml
          covered=$(grep -oP 'lines-covered="\K[0-9]+' "$COVERAGE_XML" || echo 0)
          valid=$(grep -oP 'lines-valid="\K[0-9]+' "$COVERAGE_XML" || echo 0)
          if [ "$valid" -eq 0 ]; then
            pct=0
          else
            pct=$(awk "BEGIN {printf \"%.2f\", ($covered/$valid)*100}")
          fi
          echo "Coverage percent: $pct%"
          echo "coverage=$pct" >> $GITHUB_OUTPUT
        shell: bash

      # ------------------------------
      # New step: Generate coverage badge
      # ------------------------------
      - name: Generate coverage badge
        run: |
          PCT=${{ steps.extract-coverage.outputs.coverage }}
          INT_PCT=$(printf "%.0f" "$PCT")

          if [ "$INT_PCT" -ge 80 ]; then
            COLOR="green"
          elif [ "$INT_PCT" -ge 60 ]; then
            COLOR="yellow"
          else
            COLOR="red"
          fi

          mkdir -p badges
          cat > badges/coverage.svg << EOF
          <svg xmlns="http://www.w3.org/2000/svg" width="140" height="20" role="img" aria-label="coverage: $PCT%">
            <title>coverage: $PCT%</title>
            <linearGradient id="s" x2="0" y2="100%">
              <stop offset="0" stop-color="#bbb"/>
              <stop offset="1" stop-color="#999"/>
            </linearGradient>
            <clipPath id="r"><rect width="140" height="20" rx="3" fill="#fff"/></clipPath>
            <g clip-path="url(#r)">
              <rect width="94" height="20" fill="#555"/>
              <rect x="94" width="46" height="20" fill="$COLOR"/>
              <rect width="140" height="20" fill="url(#s)" opacity="0.1"/>
            </g>
            <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" font-size="11">
              <text aria-hidden="true" x="480" y="150" fill="#010101" fill-opacity="0.3" transform="scale(.1)" textLength="840">coverage</text>
              <text x="480" y="140" transform="scale(.1)" fill="#fff" textLength="840">coverage</text>
              <text aria-hidden="true" x="1160" y="150" fill="#010101" fill-opacity="0.3" transform="scale(.1)" textLength="360">$PCT%</text>
              <text x="1160" y="140" transform="scale(.1)" fill="#fff" textLength="360">$PCT%</text>
            </g>
          </svg>
          EOF

      - name: Commit and push badge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B gh-pages
          git add badges/coverage.svg
          git commit -m "chore: update coverage badge to ${{ steps.extract-coverage.outputs.coverage }}%" || echo "No changes"
          git push -u origin gh-pages --force
