# TODO: This workflow should be thoroughly tested and validated before using in production

on: [push, pull_request]

name: R-CMD-check-and-Coverage

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest
    container:
      image: daratools/darabase:latest
    steps:
      - uses: actions/checkout@v4

      - name: Check R inside container
        run: |
          R --version
          Rscript -e 'cat("--- sessionInfo() ---\n"); print(sessionInfo())'
          Rscript -e 'install.packages("sendmailR")'
        shell: bash

      - name: Run R CMD check
        run: rcmdcheck::rcmdcheck(args = "--no-manual", error_on = "warning")
        shell: Rscript {0}

      - name: Generate coverage XML
        run: |
          Rscript -e 'if (!requireNamespace("covr", quietly = TRUE)) install.packages("covr")'
          Rscript -e 'cov <- covr::package_coverage(); covr::to_cobertura(cov, file = "coverage.xml")'
        shell: bash

      - name: Upload coverage XML artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-artifact
          path: coverage.xml
          retention-days: 1

  coverage-badge:
    runs-on: ubuntu-latest
    needs: R-CMD-check
    steps:
      - uses: actions/checkout@v4

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-artifact
          path: coverage

      - name: Extract coverage percentage
        id: calc-coverage
        run: |
          covered=$(grep -oP 'lines-covered="\K[0-9]+' coverage/coverage.xml || echo 0)
          valid=$(grep -oP 'lines-valid="\K[0-9]+' coverage/coverage.xml || echo 0)
          if [ "$valid" -eq 0 ]; then
            pct=0
          else
            pct=$(awk "BEGIN {printf \"%.2f\", ($covered/$valid)*100}")
          fi
          echo "Coverage: $pct%"
          echo "pct=$pct" >> $GITHUB_OUTPUT
        shell: bash

      - name: Generate badge SVG
        run: |
          PCT=${{ steps.calc-coverage.outputs.pct }}
          COLOR="#C55A47"
          if (( $(echo "$PCT >= 80" | awk '{print ($1>=80)}') )); then
            COLOR="#34915E"
          elif (( $(echo "$PCT >= 60" | awk '{print ($1>=60)}') )); then
            COLOR="#C4A023"
          fi

          mkdir -p badges
          cat > badges/coverage.svg <<EOF
          <svg xmlns="http://www.w3.org/2000/svg" width="110" height="20" role="img" aria-label="coverage: $PCT%">
            <title>coverage: $PCT%</title>
            <rect width="70" height="20" rx="5px" fill="#545455"/>
            <rect x="60" width="50" height="20" rx="5px" fill="$COLOR"/>
            <rect x="58" width="5" height="20" fill="#545455"/>
            <text x="30" y="14" fill="#E6E1E1" font-size="12" text-anchor="middle" font-family="monospace">Coverage</text>
            <text x="85" y="14" fill="#E6E1E1" font-size="12" text-anchor="middle" font-family="monospace">$PCT%</text>
          </svg>
          EOF
        shell: bash

      - name: Push badge to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Save badge to temp
          mkdir -p /tmp/badge
          cp badges/coverage.svg /tmp/badge/coverage.svg

          # Checkout gh-pages branch safely
          git fetch origin gh-pages || true
          git checkout gh-pages || git checkout --orphan gh-pages

          # Move badge into gh-pages
          mkdir -p badges
          cp /tmp/badge/coverage.svg badges/coverage.svg

          # Commit & push
          git add badges/coverage.svg
          git commit -m "chore: update coverage badge to $PCT%" || echo "No changes to commit"
          git push origin gh-pages
        shell: bash

