    <text aria-hidden="true" x="480" y="150" fill="#010101" fill-opacity="0.3" transform="scale(.1)" textLength="840">coverage</text>
    <text x="480" y="140" transform="scale(.1)" fill="#fff" textLength="840">coverage</text>
    <text aria-hidden="true" x="1160" y="150" fill="#010101" fill-opacity="0.3" transform="scale(.1)" textLength="360">{{PCT}}%</text>
